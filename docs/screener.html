<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPX400 パターンマッチング スクリーナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:20px;font-weight:600;margin-bottom:1.5rem}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:1.25rem 1.5rem;margin-bottom:1.25rem}
h2{font-size:15px;font-weight:600;margin-bottom:1rem}
.status-bar{font-size:13px;padding:.6rem 1rem;border-radius:8px;margin-bottom:1rem}
.status-ok{background:#e8f5e0;color:#2d6a0a}
.status-err{background:#fce8e8;color:#a32d2d}
.status-loading{background:#f0f0f0;color:#666}
.params-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1rem}
.param-card{background:#f8f8f8;border-radius:8px;padding:.75rem 1rem;border:1px solid #ebebeb}
.param-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.param-val{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
input[type=range]{width:100%;accent-color:#378ADD}
.filter-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filter-row label{font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer}
.run-btn{width:100%;padding:.7rem;font-size:15px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer}
.run-btn:hover{opacity:.85}
.run-btn:disabled{background:#bbb;cursor:not-allowed}
.progress-bar{height:5px;background:#e5e5e5;border-radius:3px;overflow:hidden;margin:.75rem 0;display:none}
.progress-fill{height:100%;background:#378ADD;width:0%;transition:width .05s}
.status{font-size:13px;color:#666;margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.chip{font-size:12px;background:#f0f0f0;padding:3px 12px;border-radius:20px;color:#555}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e5e5e5;margin-bottom:1rem}
.tab{font-size:13px;padding:6px 16px;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#888;background:none;font-weight:500;margin-bottom:-1px}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{font-size:11px;font-weight:600;color:#888;text-align:left;padding:7px 10px;border-bottom:1px solid #e5e5e5;text-transform:uppercase;white-space:nowrap}
tbody tr:hover{background:#fafafa}
tbody td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
.up{background:#e8f5e0;color:#2d6a0a}
.dn{background:#fce8e8;color:#a32d2d}
.neu{background:#f0f0f0;color:#666}
.bar{display:inline-block;height:8px;border-radius:4px;background:#378ADD;vertical-align:middle;margin-right:5px}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:14px}
.warn{font-size:12px;color:#999;margin-top:1rem;padding-top:.75rem;border-top:1px solid #f0f0f0;line-height:1.7}
.dist-wrap{display:flex;flex-wrap:wrap;gap:1.5rem;padding:.5rem 0}
.dist-item{min-width:140px}
.dist-bars{display:flex;align-items:flex-end;height:70px;border-bottom:1px solid #e5e5e5;gap:2px}
.dist-bar{border-radius:2px 2px 0 0;min-height:2px;flex:1}
</style>
</head>
<body>
<div class="wrap">
<h1>📊 JPX400 パターンマッチング スクリーナー</h1>

<div id="statusBar" class="card status-bar status-loading">⏳ データを読み込み中...</div>

<div class="card">
  <h2>⚙️ パラメーター設定</h2>
  <div class="params-grid">
    <div class="param-card">
      <div class="param-label">パターン長（日）</div>
      <div class="param-val" id="wLen-val">10</div>
      <input type="range" min="3" max="20" value="10" id="wLen" oninput="document.getElementById('wLen-val').textContent=this.value">
    </div>
    <div class="param-card">
      <div class="param-label">予測期間（日後）</div>
      <div class="param-val" id="fwd-val">10</div>
      <input type="range" min="1" max="20" value="10" id="fwd" oninput="document.getElementById('fwd-val').textContent=this.value">
    </div>
    <div class="param-card">
      <div class="param-label">類似度閾値（%）</div>
      <div class="param-val" id="sim-val">80</div>
      <input type="range" min="50" max="99" value="80" id="sim" oninput="document.getElementById('sim-val').textContent=this.value">
    </div>
    <div class="param-card">
      <div class="param-label">最低マッチ数</div>
      <div class="param-val" id="minm-val">10</div>
      <input type="range" min="3" max="50" value="10" id="minm" oninput="document.getElementById('minm-val').textContent=this.value">
    </div>
    <div class="param-card">
      <div class="param-label">RSI閾値</div>
      <div class="param-val" id="rsi-val">70</div>
      <input type="range" min="20" max="100" value="70" id="rsiThresh" oninput="document.getElementById('rsi-val').textContent=this.value">
    </div>
  </div>
  <div class="filter-row">
    <label><input type="checkbox" id="useRsi" checked> RSIフィルター（RSI &lt; 閾値）</label>
    <label><input type="checkbox" id="useTrend" checked> MA200フィルター（終値 &gt; MA200）</label>
    <label><input type="checkbox" id="usePositive" checked> 期待リターン正のみ</label>
  </div>
  <button class="run-btn" id="runBtn" disabled onclick="runScreen()">▶ スクリーニング実行</button>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="status" id="statusText"></div>
</div>

<div class="card" id="resultCard" style="display:none">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('rank')" id="tab-rank">🏆 ランキング</button>
    <button class="tab" onclick="switchTab('dist')" id="tab-dist">📊 分布</button>
    <button class="tab" onclick="switchTab('detail')" id="tab-detail">📋 詳細</button>
  </div>
  <div id="tab-rank-content">
    <div class="chips" id="chips"></div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>#</th><th>銘柄</th><th>スコア</th><th>期待リターン</th>
          <th>勝率</th><th>マッチ数</th><th>中央値</th><th>最大下落</th><th>最大上昇</th><th>直近足</th><th>シグナル</th>
        </tr></thead>
        <tbody id="rankTb"></tbody>
      </table>
    </div>
  </div>
  <div id="tab-dist-content" style="display:none">
    <div class="dist-wrap" id="distWrap"></div>
  </div>
  <div id="tab-detail-content" style="display:none">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>銘柄</th><th>平均</th><th>中央値</th><th>標準偏差</th>
          <th>勝率</th><th>最大上昇</th><th>最大下落</th><th>シャープ比</th><th>RSI</th><th>マッチ数</th>
        </tr></thead>
        <tbody id="detailTb"></tbody>
      </table>
    </div>
  </div>
  <p class="warn">⚠️ 過去データの統計分析です。将来の値動きを保証するものではありません。投資判断はご自身の責任で。</p>
</div>
<div id="emptyCard" class="card empty" style="display:none">
  <div style="font-size:36px;margin-bottom:.5rem">🔍</div>
  <p>条件に合う銘柄が見つかりませんでした。<br>類似度閾値を下げるか、フィルターを緩めてください。</p>
</div>
</div>

<script>
let rawData = null;
let results = [];

// GitHub PagesのURLからdata.jsonを自動取得
async function loadData() {
  const statusBar = document.getElementById('statusBar');
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rawData = await res.json();
    if (!rawData.data || rawData.data.length === 0) throw new Error('データが空です');
    statusBar.className = 'card status-bar status-ok';
    statusBar.textContent = `✅ ${rawData.ticker_count}銘柄 読み込み完了（更新: ${rawData.run_time}）`;
    document.getElementById('runBtn').disabled = false;
  } catch(e) {
    statusBar.className = 'card status-bar status-err';
    statusBar.textContent = `❌ データ読み込み失敗: ${e.message}`;
  }
}

loadData();

function normReturn(arr) {
  const rets = [];
  for (let i = 1; i < arr.length; i++)
    rets.push(arr[i-1] !== 0 ? (arr[i]-arr[i-1])/arr[i-1] : 0);
  return rets;
}

function cosSim(a, b) {
  const len = Math.min(a.length, b.length);
  let dot=0, na=0, nb=0;
  for (let i=0;i<len;i++) { dot+=a[i]*b[i]; na+=a[i]**2; nb+=b[i]**2; }
  return dot / (Math.sqrt(na)*Math.sqrt(nb)||1);
}

function runScreen() {
  if (!rawData) return;
  const wLen = +document.getElementById('wLen').value;
  const fwd  = +document.getElementById('fwd').value;
  const simT = +document.getElementById('sim').value / 100;
  const minM = +document.getElementById('minm').value;
  const rsiT = +document.getElementById('rsiThresh').value;
  const useRsi   = document.getElementById('useRsi').checked;
  const useTrend = document.getElementById('useTrend').checked;
  const usePos   = document.getElementById('usePositive').checked;

  document.getElementById('runBtn').disabled = true;
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('emptyCard').style.display = 'none';
  results = [];

  const data = rawData.data;
  let idx = 0;

  function next() {
    if (idx >= data.length) { finish(); return; }
    const d = data[idx++];
    document.getElementById('progressFill').style.width = (idx/data.length*100)+'%';
    document.getElementById('statusText').textContent = `分析中: ${d.ticker} (${idx}/${data.length})`;

    if (useRsi && d.rsi >= rsiT) { setTimeout(next, 0); return; }
    if (useTrend && !d.above_ma200) { setTimeout(next, 0); return; }

    const closes = d.closes;
    const N = closes.length;
    if (N < wLen + fwd + 10) { setTimeout(next, 0); return; }

    const query = normReturn(closes.slice(N - wLen));
    const rets = [];
    for (let i = 0; i <= N - wLen - fwd; i++) {
      const seg = normReturn(closes.slice(i, i + wLen));
      if (cosSim(query, seg) >= simT) {
        const ep = closes[i + wLen - 1];
        const xp = closes[i + wLen - 1 + fwd];
        if (ep > 0) rets.push((xp - ep) / ep * 100);
      }
    }
    if (rets.length < minM) { setTimeout(next, 0); return; }

    rets.sort((a,b)=>a-b);
    const mean = rets.reduce((a,b)=>a+b,0) / rets.length;
    if (usePos && mean <= 0) { setTimeout(next, 0); return; }

    const median  = rets[Math.floor(rets.length/2)];
    const winRate = rets.filter(r=>r>0).length / rets.length;
    const std     = Math.sqrt(rets.reduce((a,b)=>a+(b-mean)**2,0)/rets.length) || 0.01;
    const sharpe  = mean / std;
    const score   = winRate*40 + Math.min(mean,10)*3 + Math.min(sharpe,3)*20;

    results.push({
      ticker: d.ticker, mean, median, winRate, matchCount: rets.length,
      std, sharpe, maxDD: rets[0], maxUp: rets[rets.length-1],
      score, rsi: d.rsi, rets,
      recentPrices: closes.slice(-wLen),
    });
    setTimeout(next, 0);
  }
  next();

  function finish() {
    results.sort((a,b) => b.score - a.score);
    document.getElementById('runBtn').disabled = false;
    document.getElementById('statusText').textContent =
      `✅ 完了: ${results.length}銘柄がシグナル条件を満たしました`;

    if (!results.length) {
      document.getElementById('emptyCard').style.display = 'block';
      return;
    }
    renderRank(); renderDist(); renderDetail();
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('chips').innerHTML = [
      `<span class="chip">更新: ${rawData.run_time}</span>`,
      `<span class="chip">対象: ${rawData.ticker_count}銘柄</span>`,
      `<span class="chip">シグナル: ${results.length}銘柄</span>`,
      `<span class="chip">パターン長: ${wLen}日</span>`,
      `<span class="chip">予測: ${fwd}日後</span>`,
      `<span class="chip">類似度: ${Math.round(simT*100)}%以上</span>`,
    ].join('');
  }
}

function mini(prices) {
  const mn=Math.min(...prices), mx=Math.max(...prices), rng=mx-mn||1;
  return '<span style="display:inline-flex;align-items:flex-end;gap:1px;height:28px;vertical-align:middle">'
    +prices.map(p=>{
      const h=Math.max(2,Math.round((p-mn)/rng*24));
      const c=p>=prices[0]?'#2d6a0a':'#a32d2d';
      return `<span style="width:5px;height:${h}px;background:${c};border-radius:1px 1px 0 0;display:inline-block"></span>`;
    }).join('')+'</span>';
}

function renderRank() {
  document.getElementById('rankTb').innerHTML = results.map((r,i) => {
    const mB = r.mean>=0
      ? `<span class="badge up">+${r.mean.toFixed(2)}%</span>`
      : `<span class="badge dn">${r.mean.toFixed(2)}%</span>`;
    const sc = Math.min(100, Math.round(r.score));
    const sig = r.mean>2&&r.winRate>0.6 ? '<span class="badge up">強</span>'
      : r.mean>0&&r.winRate>0.5 ? '<span class="badge neu">中</span>'
      : '<span class="badge dn">弱</span>';
    return `<tr>
      <td style="color:#aaa">${i+1}</td>
      <td style="font-weight:600">${r.ticker}</td>
      <td><span class="bar" style="width:${sc}px"></span>${sc}</td>
      <td>${mB}</td>
      <td>${(r.winRate*100).toFixed(1)}%</td>
      <td>${r.matchCount}</td>
      <td style="color:#666">${r.median.toFixed(2)}%</td>
      <td style="color:#a32d2d">${r.maxDD.toFixed(2)}%</td>
      <td style="color:#2d6a0a">+${r.maxUp.toFixed(2)}%</td>
      <td>${mini(r.recentPrices)}</td>
      <td>${sig}</td>
    </tr>`;
  }).join('');
}

function renderDist() {
  document.getElementById('distWrap').innerHTML = results.slice(0,9).map(r => {
    const bins=10, mn=r.rets[0], mx=r.rets[r.rets.length-1];
    const step=(mx-mn)/bins||1;
    const counts=new Array(bins).fill(0);
    r.rets.forEach(v=>counts[Math.min(bins-1,Math.floor((v-mn)/step))]++);
    const maxC=Math.max(...counts)||1;
    return `<div class="dist-item">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">${r.ticker}</div>
      <div class="dist-bars">${counts.map((c,i)=>{
        const h=Math.max(2,Math.round(c/maxC*60));
        const col=(mn+i*step)>=0?'#2d6a0a':'#e24b4a';
        return `<div class="dist-bar" style="height:${h}px;background:${col}"></div>`;
      }).join('')}</div>
      <div style="font-size:11px;color:#888;margin-top:3px">${mn.toFixed(1)}%〜${mx.toFixed(1)}%</div>
      <div style="font-size:11px;color:#888">勝率${(r.winRate*100).toFixed(1)}% n=${r.matchCount}</div>
    </div>`;
  }).join('');
}

function renderDetail() {
  document.getElementById('detailTb').innerHTML = results.map(r => `<tr>
    <td style="font-weight:600">${r.ticker}</td>
    <td>${r.mean>=0?'+':''}${r.mean.toFixed(2)}%</td>
    <td>${r.median>=0?'+':''}${r.median.toFixed(2)}%</td>
    <td>${r.std.toFixed(2)}%</td>
    <td>${(r.winRate*100).toFixed(1)}%</td>
    <td style="color:#2d6a0a">+${r.maxUp.toFixed(2)}%</td>
    <td style="color:#a32d2d">${r.maxDD.toFixed(2)}%</td>
    <td>${r.sharpe.toFixed(2)}</td>
    <td>${r.rsi}</td>
    <td>${r.matchCount}</td>
  </tr>`).join('');
}

function switchTab(name) {
  ['rank','dist','detail'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===name);
    document.getElementById(`tab-${t}-content`).style.display = t===name?'':'none';
  });
}
</script>
</body>
</html>
