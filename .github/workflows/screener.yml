name: JPX400 Daily Screener

on:
  schedule:
    - cron: '35 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install
        run: pip install yfinance pandas numpy
      - name: run
        run: python screener.py
      - name: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/index.html
          git diff --staged --quiet || git commit -m "update"
          git push origin HEAD:main --force
